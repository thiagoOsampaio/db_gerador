services:
  postgres:
    image: postgres:16-alpine
    container_name: db_gerador_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-db_gerador}
      POSTGRES_USER: ${POSTGRES_USER:-db_gerador}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-db_gerador}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: db_gerador_backend
    environment:
      POSTGRES_HOST: postgres
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - app

volumes:
  postgres_data:
